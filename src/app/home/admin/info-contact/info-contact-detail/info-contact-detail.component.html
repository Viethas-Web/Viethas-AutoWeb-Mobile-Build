<div class="add-product w-100 h-100 d-flex flex-column">
  <div class="_head d-flex justify-content-between align-items-center flex-shrink-0">
    <div class="title">
      <h2 class="m-0">{{'chi_tiet_lien_he' | translate}}</h2>
    </div>
    <span class="_icon" nz-icon nzType="close" nzTheme="outline" (click)="close()">
    </span>
  </div>
  <div class="main flex-grow-1">
    <form class="form p-0 m-0" *ngIf="contactDetailForm" [formGroup]="contactDetailForm">
      <div class="row">
        <!-- Tên -->
        <div class="col-6">
          <div>
            <label for="name-input">{{'ten' | translate}} </label>
          </div>
          <div class="layout-input">
            <input class="input" type="text" formControlName="name" placeholder="{{'nhap_ten' | translate}}">
          </div>
        </div>

        <!-- Ngày gửi -->
        <div class="col-6">
          <div>
            <label for="name-input">{{'ngay_gui' | translate}} </label>
          </div>
          <div class="layout-input">
            <input class="input" type="text" formControlName="date" placeholder="{{'nhap_ngay_gui' | translate}}">
          </div>
        </div>

        <!-- Số điện thoại -->
        <div class="col-6">
          <div>
            <label for="name-input">{{'so_dien_thoai' | translate}} <span style="color: red;">*</span></label>
          </div>
          <div class="layout-input">
            <input class="input" type="text" formControlName="telephone"
              placeholder="{{'nhap_so_dien_thoai' | translate}}">
          </div>
        </div>

        <!-- Email -->
        <div class="col-6">
          <div>
            <label for="name-input">{{'Email' | translate}} <span style="color: red;">*</span></label>
          </div>
          <div class="layout-input">
            <input class="input" type="text" formControlName="email" placeholder="{{'nhap_email' | translate}}">
          </div>
        </div>

        <!-- Nội dung -->
        <div class="col-12">
          <div class="d-flex justify-content-between align-items-center">
            <label for="name-input">{{'noi_dung' | translate}} </label>
            <button 
              *ngIf="!isContentExpanded && isContentLong" 
              type="button"
              class="btn-expand" 
              (click)="toggleContent()">
              <span nz-icon nzType="eye" nzTheme="outline"></span>
              {{'xem_them' | translate}}
            </button>
            <button 
              *ngIf="isContentExpanded" 
              type="button"
              class="btn-expand" 
              (click)="toggleContent()">
              <span nz-icon nzType="eye-invisible" nzTheme="outline"></span>
              {{'thu_gon' | translate}}
            </button>
          </div>
          <div class="layout-input">
            <textarea 
              class="input w-100" 
              type="text" 
              formControlName="content"
              [class.expanded]="isContentExpanded"
              [class.collapsed]="!isContentExpanded && isContentLong"
              placeholder="{{'noi_dung' | translate}}"
              readonly></textarea>
          </div>
        </div>

        <!-- Custom fields -->
        <div *ngFor="let item of newFields" class="col-6">
          <div>
            <label for="name-input">{{item.field_lable | translate}} <span *ngIf="item.field_required"
                style="color: red;">*</span></label>
          </div>
          <div class="layout-input">
            <div class="d-flex " style="gap: 8px">
              <input class="input" type="text" [formControlName]="item.field_custom">
              <app-select-language-config [isAdmin]="true"></app-select-language-config>
            </div>
          </div>
        </div>

      </div>
    </form>
  </div>

</div>
