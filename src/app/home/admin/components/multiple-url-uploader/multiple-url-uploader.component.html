<div class="main h-100">
  <div class="_head d-flex justify-content-between align-items-center">
    <div class="title">
      <h2 class="m-0">{{'tai_anh_tu_duong_dan' | translate}}</h2>
    </div>
    <span class="_icon" nz-icon nzType="close" nzTheme="outline" (click)="close()">
    </span>
  </div>
  <div class="_body pt-2">
    <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12 p-0 pb-2 d-flex align-items-center justify-content-between">
      <h3 class="m-0" style="color: #008848; font-size: 16px;">{{'danh_sach_duong_dan' | translate}}</h3>
      <button class="_btn_add_link ml-2" (click)="addUrl()">{{'them_duong_dan' | translate}}</button>
    </div>

    <div class="row p-0 m-0 w-100 " [style.height]="urls.length >= 10? '400px':''">
      <ng-container *ngFor="let url of urls; index as i">
        <div class="col-12 p-0 pb-2 d-flex align-items-center justify-content-center">
          <input #valueInput class="input mr-2" type="text" placeholder="{{'nhap_duong_dan_anh' | translate}}" [value]="url.path" (blur)="accept(valueInput.value,i)">
          <span *ngIf="urls.length > 1" role="button" nz-icon nzType="delete" nzTheme="outline" class="_delete_iframe"
            (click)="deleteUrl(i)"></span>
        </div>
      </ng-container>
    </div>
  </div>
  <div class="_foot d-flex align-items-center justify-content-end">
    <button class="_btn _btn_cancel d-flex align-items-center right-all-content mr-2" nz-button nzType="default"
      (click)="close()">
     {{'huy' | translate}}
    </button>
    <button class="mr-2" nz-button nzType="primary" (click)="handelOk()"
      class="_btn _btn_add d-flex align-items-center right-all-content mr-2" nz-button nzType="default">
    {{'them' | translate}}
    </button>
  </div>
</div>
