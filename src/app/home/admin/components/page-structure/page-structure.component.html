<div class="wrapper">
  <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="example-tree">
    <!-- Tree không có expand -->
    <mat-tree-node *matTreeNodeDef="let node" matTreeNodeToggle>
      <!-- Nút expand rỗng -->
      <button mat-icon-button matTreeNodeToggle [attr.aria-label]="'Toggle ' + node.name">
        <mat-icon class="mat-icon-rtl-mirror">
          <!-- {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}} -->
        </mat-icon>
      </button>
      <!-- Node -->
      <li class="mat-tree-node" (click)="picking(node)" 
        [ngClass]="{'node-selected': node._id === blockChoosing?._id || node._id === objectChoosing?._id}"
        [title]="node.component + ' - ' + node._id">
        <ng-container *ngTemplateOutlet="iconTemplate; context: { otype: node.otype }"></ng-container>
        {{node.name}}
      </li>
    </mat-tree-node>
    <!-- Tree có expand -->
    <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild">
      <li>
        <div class="mat-tree-node" (click)="picking(node)" 
          [ngClass]="{'node-selected': node._id === blockChoosing?._id || node._id === objectChoosing?._id}"
          [title]="node.component + ' - ' + node._id">
          <!-- Nút expand -->
          <button mat-icon-button matTreeNodeToggle [attr.aria-label]="'Toggle ' + node.name">
            <mat-icon class="mat-icon-rtl-mirror">
              {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
            </mat-icon>
          </button>
          <!-- icon block/object -->
          <ng-container *ngTemplateOutlet="iconTemplate; context: { otype: node.otype }"></ng-container>
          <!-- Tên node -->
          {{node.name}}
        </div>
        <!-- Đệ quy node con -->
        <ul *ngIf="treeControl.isExpanded(node)">
          <ng-container matTreeNodeOutlet></ng-container>
        </ul>
      </li>
    </mat-nested-tree-node>
  </mat-tree>

  <!-- template icon cho block/object -->
  <ng-template #iconTemplate let-otype="otype">
    <span *ngIf="otype === undefined" nz-icon nzType="border" nzTheme="outline"></span>
    <span *ngIf="otype === 'frame'" nz-icon nzType="table" nzTheme="outline"></span>
  </ng-template>

</div>
