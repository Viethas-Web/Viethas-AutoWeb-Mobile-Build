<div class="add-product h-100">
  <div class="_head d-flex justify-content-between align-items-center">
    <div class="title">
      <h2 class="m-0">{{'cap_nhat_topping' | translate}}</h2>
    </div>
    <span class="_icon" nz-icon nzType="close" nzTheme="outline" (click)="close()">
    </span>
  </div>
  <div class="main">
    <form class="form" *ngIf="data" [formGroup]="editSideDishForm">
      <div class="row">
        <!-- Tên, danh mục -->
        <div class="col-6 padding">
          <div>
            <label for="name-input">{{'ten_san_pham' | translate }}<sup>*</sup></label>
          </div>
          <div class="layout-input d-flex" style="gap:8px">
            <input class="input" type="text" [formControl]="getFormControl('name_' + functionService.languageTempCode)" placeholder="{{'nhap_ten_san_pham' | translate }}"
              (blur)="updateDynamicField('name', editSideDishForm.value['name_' + functionService.languageTempCode])">
						<app-select-language-config [isAdmin]="true"></app-select-language-config>
					</div>
        </div>
        <div class="col-6 padding">
          <div>
            <label for="name-input">{{'danh_muc' | translate }} <sup>*</sup></label>
          </div>
          <div class="layout-input d-flex" style="gap:8px">
            <div style="width:100%; ">
              <nz-select
                nzMode="multiple"
                formControlName="id_categorys"
                [nzPlaceHolder]="'trong' | translate"
                (ngModelChange)="updateProduct('id_categorys', { id_categorys: editSideDishForm.value.id_categorys })"
                nzShowSearch
              >
                <ng-container *ngFor="let o of categories">
                  <nz-option  nzCustomContent [nzValue]="o._id" [nzLabel]="renderOptionCategory(o)">
                    {{ renderOptionCategory(o) }}
                  </nz-option>
                </ng-container>
              </nz-select>
            </div>

            <button class="center-all-content button_list_unit" nz-button nzType="default" (click)="createCategory()">
              <span nz-icon nzType="plus-circle" nzTheme="outline"></span>
              {{'tao_nhanh' | translate }}
            </button>
          </div>
        </div>

        <div class="col-6 padding">
          <div class="d-flex align-items-center">
            <label for="name-input">{{'duong_dan_chi_tiet' | translate}}</label>
            <span class="ml-1"  style="margin-bottom: .5rem" nz-icon nzType="question-circle" nzTheme="outline" [nz-tooltip]="'chu_y_duong_dan_chi_co_the_la' | translate"></span>
          </div>
          <div class="layout-input">
            <input class="input" type="text" formControlName="link" placeholder="{{'nhap_duong_dan' | translate}}"
              (blur)="updateProduct('link', {link: editSideDishForm.value.link})">
              <div *ngIf="editSideDishForm.get('link').invalid && editSideDishForm.get('link').touched" class="error-message">
                <small *ngIf="editSideDishForm.get('link').errors.required">{{'vui_long_nhap_duong_dan' | translate}}</small>
                <small *ngIf="editSideDishForm.get('link').errors.pattern">{{'duong_dan_khong_hop_le' | translate}}</small>
              </div>
          </div>
        </div>

        <div class="col-6 padding">
          <div>
            <label for="name-input">{{'don_vi' | translate }}<sup>*</sup></label>
          </div>
          <div class="layout-input d-flex" style="gap:8px">
            <input class="input" type="text" [formControl]="getFormControl('unit_' + functionService.languageTempCode)"
              (blur)="updateDynamicField('unit', editSideDishForm.value['unit_' + functionService.languageTempCode])" placeholder="{{'nhap_don_vi' | translate }}">
						<app-select-language-config [isAdmin]="true"></app-select-language-config>
					</div>
        </div>
        <!-- Giá bán, giá nhập -->
        <div class="col-6 padding">
          <div>
            <label for="name-input">{{'gia_ban' | translate }} <sup>*</sup></label>
          </div>
          <div class="layout-input">
            <input class="input price" type="text" formControlName="price" placeholder="{{'nhap_gia_ban' | translate }}"
              (blur)="updateProduct('price', {price: editSideDishForm.value.price})">
          </div>
        </div>

        <!-- Giá bán buôn, giá bán khuyến mãi -->

        <div class="col-6 padding">
          <div>
            <label for="name-input">{{'gia_ban_chua_khuyen_mai' | translate }}</label>
          </div>
          <div class="layout-input">
            <input class="input price_sales" type="text" formControlName="webapp_price_sales"
              placeholder="{{'nhap_gia_ban_chua_khuyen_mai' | translate }}"
              (blur)="updateProduct('webapp_price_sales', {webapp_price_sales: editSideDishForm.value.webapp_price_sales})">
          </div>
        </div>

        <!-- Số lượng cảnh báo hết hàng -->
        <div class="col-6 padding">
          <div>
            <label for="name-input">Barcode</label>
          </div>
          <div class="layout-input d-flex justify-content-between">
            <input class="input warning_number" formControlName="barcode" placeholder="{{'nhap_quet_ma_vach_san_pham' | translate }}">
            <i style="margin: 8px 0 0 8px; cursor: pointer" nz-icon nzType="reload" nzTheme="outline" nz-tooltip
              nzTooltipTitle="{{'tao_ma_vach_tu_dong' | translate }}" nzTooltipPlacement="bottom"
              (click)="generateBarcodesAutomatically()"></i>
          </div>
        </div>
      </div>
      <!-- Bật/ tắt -->
      <div class="row padding">
        <div class="col-6">
          <div class="d-flex justify-content-between">
            <label>{{'an_hien_thi_san_pham_tren_website' | translate}}</label>
            <nz-switch formControlName="webapp_hidden"
              (ngModelChange)="updateProduct('webapp_hidden', {webapp_hidden: editSideDishForm.value.webapp_hidden})"></nz-switch>
          </div>
        </div>
      </div>


      <!-- Danh sách hình ảnh sản phẩm -->
      <div class="row p-0 m-0 pt-2">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12 p-0 pb-2">
          <h3 class="m-0" style="color: #008848; font-size: 16px;">{{'hinh_anh_san_pham_hien_thi_tren_website' | translate}}</h3>
        </div>
        <ng-template [ngTemplateOutlet]="listImages"></ng-template>
      </div>

      <div class="tab-editor">
        <div class="flag">
          <app-select-language-config [isAdmin]="true"></app-select-language-config>
        </div>
        <nz-tabset style="display: contents" [(nzSelectedIndex)]="selectedIndexTabset" class="row p-0 m-0">
          <nz-tab *ngFor="let item of ckeditorFields; let i = index" [nzTitle]="item.field_lable | translate">
            <ng-container *ngIf="selectedIndexTabset === i">
              <ckeditor
                class="ckeditor-admin"
                (blur)="updateDynamicField(item.field_custom, editSideDishForm.get(item.field_custom + '_' + functionService.languageTempCode).value)"
                [editor]="EDITOR" (ready)="onReady($event)" [config]="functionService.CKEDITORConfig"
                [formControl]="getFormControl(item.field_custom + '_' + functionService.languageTempCode)">
              </ckeditor>
            </ng-container>
          </nz-tab>
        </nz-tabset>
      </div>

      <button class="_btn _btn_cancel d-flex align-items-center right-all-content mt-2" nz-button nzType="primary" (click)="openCKEditorByDevice()">
        {{'mo_ta_rieng_cho_tung_thiet_bi' | translate}}
      </button>

      <!-- Nội dùng SEO -->
      <div class="col-12" style="padding: 5pt 0 0;">
        <div>
          <div class="title d-flex flex-row justify-content-between">
            <h5 style="font-size: 16px; margin: 6pt 0px !important;">SEO</h5>
            <app-select-language-config [isAdmin]="true"></app-select-language-config>
          </div>
          <div class="_body_seo">
            <div class="d-flex justify-content-between align-items-center">
              <div class="label">
                <label class="m-0" for="webapp_seo_title">{{'tieu_de' | translate}}</label>
              </div>
              <div class="text">
                <input class="input" type="text" [formControl]="getFormControl('webapp_seo_title_' + functionService.languageTempCode)" id="webapp_seo_title"
                  placeholder="{{'nhap_tieu_de' | translate}}"
                  (blur)="updateDynamicField('webapp_seo_title', editSideDishForm.value['webapp_seo_title_' + functionService.languageTempCode])">
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <div class="label">
                <label class="m-0" for="webapp_seo_description">{{'mieu_ta' | translate}}</label>
              </div>
              <div class="text">
                <input class="input" type="text" [formControl]="getFormControl('webapp_seo_description_' + functionService.languageTempCode)" id="webapp_seo_description"
                  placeholder="{{'nhap_mieu_ta' | translate}}"
                  (blur)="updateDynamicField('webapp_seo_description', editSideDishForm.value['webapp_seo_description_' + functionService.languageTempCode])">
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <div class="label">
                <label class="m-0" for="webapp_seo_keyword">{{'tu_khoa' | translate}}</label>
              </div>
              <div class="text">
                <input class="input" type="text" [formControl]="getFormControl('webapp_seo_keyword_' + functionService.languageTempCode)" id="webapp_seo_keyword"
                  placeholder="{{'nhap_tu_khoa' | translate}}" data-role="tagsinput"
                  (blur)="updateDynamicField('webapp_seo_keyword', editSideDishForm.value['webapp_seo_keyword_' + functionService.languageTempCode])">
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>

    <!-- Danh sách hình ảnh của sản phẩm -->
    <ng-template #listImages>
      <app-list-images [imgs]="listImgProduct" [folderName]="'images/database/side-dishes'"
        (sendImgs)="sendImgs($event)" [setupsImage]="setupToppingImg"></app-list-images>

    </ng-template>
  </div>
</div>
