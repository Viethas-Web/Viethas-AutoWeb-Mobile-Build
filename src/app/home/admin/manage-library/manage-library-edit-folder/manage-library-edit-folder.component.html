<div style="background-color: white !important; margin: auto; padding: 6px;">
    <h2 style="height: 10%; font-size: 22px !important; display: flex; justify-content: space-between;"><span>{{('sua_' + mapTitle[type]) | translate }}</span></h2>
    <div style="width: 100%; height: 80%; display: flex;">
        <mat-form-field class="example-full-width">
            <mat-label>{{(mapTitle[type]) | translate }}</mat-label>
            <input matInput [(ngModel)]="folderName" matInput />
        </mat-form-field>
    </div>
    <mat-dialog-actions align="end" style="height: 10%;">
        <button mat-button mat-dialog-close>{{'huy' | translate }}</button>
        <button (click)="editFolder()" mat-button cdkFocusInitial>{{'luu' | translate }}</button>
    </mat-dialog-actions>
  </div>
