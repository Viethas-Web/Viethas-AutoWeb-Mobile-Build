<div class="wrapper">
    <span style="cursor: pointer;" (click)="goBack()"><i class="bi bi-arrow-left"></i>{{'tro_ve' | translate}}</span>
    <div class="heading">
        <div class="tool-left">
            <p class="m-0 title">{{'chi_tiet' | translate}} {{data.name}}</p>
        </div>
        <div class="tool-center" style="width: 240px">
            <nz-input-group [nzSuffix]="suffixIconSearch">
                <input type="text" nz-input placeholder="{{'tim_ten_voucher' | translate}}" [(ngModel)]="keySearchVoucher" (keyup)="searchVoucherOutSide(keySearchVoucher)"/>
            </nz-input-group>
            <ng-template #suffixIconSearch>
                <span nz-icon nzType="search"></span>
            </ng-template>
        </div>
        <div class="tool-right">
            <button class="add-voucher" (click)="gotoAddVoucherToRelease()">+ {{'chon_voucher_phat_hanh' | translate}}</button>
        </div>
    </div>
    <br />
    <div class="content">
        <nz-table #basicTable [nzData]="listShow">
            <thead>
                <tr>
                    <th (click)="isSortName = !isSortName;sortTable('name')" nzWidth="15%">{{'ten_voucher' | translate}} <i
                            [class]="isSortName ? 'bi bi-caret-up-fill' :'bi bi-caret-down-fill'"
                            style="cursor: pointer;"></i> </th>
                    <th nzWidth="45%">{{'san_pham_trong_voucher' | translate}}</th>
                    <th nzWidth="30%" nzAlign="center" (click)="isSortQuantity = !isSortQuantity;sortTable('quantity_released')">{{'so_luong_voucher_da_phat_hanh' | translate}}<i [class]="isSortQuantity ? 'bi bi-caret-up-fill' : 'bi bi-caret-down-fill'"
                            style="cursor: pointer;"></i></th>
                    <th nzWidth="10%">{{'chuc_nang' | translate}}</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let data of basicTable.data">
                    <td >{{data.name}}</td>
                    <td>{{data.products}}</td>
                    <td nzAlign="center">{{data.quantity_released}}</td>
                    <td nzAlign="center"><button style="color: red;padding: 10px;background: none;" nz-popconfirm
                            [nzPopconfirmTitle]="'Xóa voucher '+data.name+ ' khỏi đợt này?'" nzPopconfirmPlacement="bottom"
                            (nzOnConfirm)="deleteVoucherReleased(data)" nzCancelText="Hủy" nzOkText="Xóa"><i
                                class="bi bi-trash"></i></button></td>
                </tr>
            </tbody>
        </nz-table>
    </div>
</div>
<!-- open modal -->
<nz-modal [(nzVisible)]="isOpenModal" nzTitle="{{'chon_voucher' | translate}}" (nzOnCancel)="handleCancel()" (nzOnOk)="handleAdd()"
    nzCancelText="{{'huy' | translate}}" nzOkText="{{'them' | translate}}">
    <ng-container *nzModalContent>
        <div class="search-bar">
            <nz-input-group [nzSuffix]="suffixIconSearch">
                <input type="text" nz-input placeholder="{{'nhap_voucher_can_tim' | translate}}" 
                [(ngModel)]="keySearch" (ngModelChange)="searchVoucherRelease(keySearch)"/>
            </nz-input-group>
            <ng-template #suffixIconSearch>
                <span nz-icon nzType="search"></span>
            </ng-template>
        </div>
        <div class="body">
            <ul nz-list [nzDataSource]="showVoucherModal">
                <li nz-list-item *ngFor="let item of showVoucherModal;let i = index" [ngStyle]="{
                    'display': item.display,
                    'cursor': 'pointer'
                }" (click)="chooseVoucherToRelease(i)">
                    <ul nz-list-item-actions>
                        <nz-list-item-action>
                            <label nz-checkbox [(ngModel)]="item.choose"></label>
                        </nz-list-item-action>
                    </ul>
                    {{ item.name }}
                </li>
            </ul>
            <nz-empty nzNotFoundImage="simple" *ngIf="!showVoucherModal.length"
                nzNotFoundContent="{{'khong_co_voucher' | translate}}!"></nz-empty>
        </div>
    </ng-container>
</nz-modal>
