<div class="fields-google-shopping p-4">
  <h1 class="text-primary-green font-bold">Cấu hình trường dữ liệu</h1>
  <nz-tabset>
    <nz-tab *ngFor="let tab of tabs" [nzTitle]="tab.title | translate">
      <ng-container *ngTemplateOutlet="tableTemplate; context: { tab: tab }"></ng-container>
    </nz-tab>
  </nz-tabset>
</div>

<ng-template #tableTemplate let-tab="tab">
  <div class="mb-4 flex gap-2">
    <button nz-button nzType="primary" (click)="showStructureProduct(tab.sector)">Xem cấu trúc {{tab.title | translate}}</button>
    <button nz-button nzType="primary" (click)="showStructure(tab.sector)">Xem cấu trúc script</button>
  </div>

  <nz-table nzBordered [nzData]="getData(tab.sector)?.data || []" [nzShowPagination]="false" [nzLoading]="loadings[tab.sector]">
    <thead>
      <tr>
        <th nzWidth="30%">Trường dữ liệu</th>
        <th>Loại</th>
        <th>Giá trị/Trường liên kết</th>
        <th>Thao tác</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of getData(tab.sector)?.data || []; let index = index" class="editable-row">
        <td>
          <div class="editable-cell" [hidden]="editIndices[tab.sector] === index" (click)="startEdit(index, tab.sector)">
            {{ data.key }}
          </div>
          <input [hidden]="editIndices[tab.sector] !== index" nz-input [(ngModel)]="data.key" (blur)="stopEdit(tab.sector)" />
          <div *ngIf="keyErrorIndices[tab.sector] === index" class="text-red text-xs">Key bị trùng!</div>
        </td>
        <td>
          <nz-select [(ngModel)]="data.type" (ngModelChange)="onDataChange(tab.sector)">
            <nz-option nzValue="value" nzLabel="Giá trị"></nz-option>
            <nz-option nzValue="field" nzLabel="Trường dữ liệu"></nz-option>
          </nz-select>
        </td>
        <td>
          <ng-container *ngIf="data.type === 'value'; else fieldSelect">
            <input nz-input placeholder="Nhập giá trị nếu có" [(ngModel)]="data.value" (ngModelChange)="onDataChange(tab.sector)" />
          </ng-container>
          <ng-template #fieldSelect>
            <nz-select [(ngModel)]="data.field" (ngModelChange)="onDataChange(tab.sector)">
              <nz-option [nzValue]="''" nzLabel="Chọn trường liên kết"></nz-option>
              <nz-option-group *ngFor="let group of groupedFields(tab.sector); trackBy: trackByGroup" [nzLabel]="group.label">
                <nz-option *ngFor="let item of group.fields; trackBy: trackByField" [nzValue]="item.field_custom" [nzLabel]="item.field_label"></nz-option>
              </nz-option-group>
            </nz-select>
          </ng-template>
        </td>
        <td>
          <div class="flex gap-2 items-center">
            <a nz-tooltip nzTooltipTitle="Thêm hàng mới" (click)="addRow(tab.sector, index)">
              <span nz-icon nzType="plus-circle" nzTheme="outline" style="color:#0b89ff"></span>
            </a>
            <a nz-tooltip nzTooltipTitle="Xóa hàng" nz-popconfirm nzPopconfirmTitle="Bạn chắc chắn muốn xóa?" (nzOnConfirm)="deleteRow(data.key, tab.sector)">
              <span nz-icon nzType="delete" nzTheme="outline" style="color:red"></span>
            </a>
          </div>
        </td>
      </tr>
    </tbody>
  </nz-table>
</ng-template>
